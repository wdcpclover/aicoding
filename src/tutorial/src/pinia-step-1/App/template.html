<div style="font-family: 'Microsoft YaHei', sans-serif; padding: 24px; line-height: 1.8;">
  <h1>🍍 第一个 Pinia Store</h1>

  <div style="background: #f5f5f5; padding: 16px; border-radius: 8px; margin: 16px 0; font-family: monospace;">
    count       = <strong style="color: #42b983; font-size: 22px;">{{ count }}</strong>
    <span style="color: #999;">（state）</span><br>
    doubleCount = <strong style="color: #f08d49; font-size: 22px;">{{ doubleCount }}</strong>
    <span style="color: #999;">（getter）</span>
  </div>

  <button
    @click="increment()"
    style="padding: 10px 24px; font-size: 16px; cursor: pointer; background: #42b983; color: white; border: none; border-radius: 6px;"
  >
    +1
  </button>

  <p style="margin-top: 24px; color: #666; font-size: 14px;">
    点 +1 调用 store 的 <code>increment()</code> action：count 自增 1，doubleCount 自动重算。<br>
    切换右上角的"组合式 / 选项式"toggle，看 store 文件 + 组件消费方式同步切换。
  </p>
</div>
