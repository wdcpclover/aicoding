<div class="page">
  <div class="head">
    <h2>📚 商品（组件 A）</h2>
    <span class="cart-badge">🛒 {{ count }}</span>
  </div>

  <ul class="products">
    <li v-for="p in products" :key="p.id">
      <span>{{ p.name }}</span>
      <span class="price">¥{{ p.price }}</span>
      <button @click="addToCart(p)">加入购物车</button>
    </li>
  </ul>

  <!-- 另一个组件，读同一个 store -->
  <CartPanel />

  <p class="tip">
    💡 「商品」和「购物车」是<b>两个不同组件</b>，但 <code>useCartStore()</code> 拿到的是<b>同一份数据</b>。<br>
    在上面加商品 → 下面购物车<b>立刻</b>更新，顶部角标也同步 —— 这就是 Pinia「单一数据源」。
  </p>
</div>
