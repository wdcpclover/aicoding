<div style="font-family: 'Microsoft YaHei', sans-serif; padding: 24px; line-height: 1.8;">
  <h1>Getter：派生状态</h1>

  <div style="background: #f5f5f5; padding: 16px; border-radius: 8px; margin: 16px 0; font-family: monospace; font-size: 15px;">
    count           = <strong style="color: #42b983;">{{ count }}</strong>  <span style="color: #999;">（state）</span><br>
    doubleCount     = <strong style="color: #f08d49;">{{ doubleCount }}</strong>  <span style="color: #999;">（getter: count * 2）</span><br>
    doublePlusOne   = <strong style="color: #d9534f;">{{ doublePlusOne }}</strong>  <span style="color: #999;">（getter: doubleCount + 1）</span>
  </div>

  <button
    @click="increment()"
    style="padding: 10px 24px; font-size: 16px; cursor: pointer; background: #42b983; color: white; border: none; border-radius: 6px;"
  >
    count + 1（看上面 3 个值同步变化）
  </button>

  <hr style="margin: 24px 0; border: 0; border-top: 1px solid #eee;">

  <h3>带参数的 getter：getUserById</h3>
  <p>
    输入用户 ID（1 - 3）：
    <input v-model="queryId" type="number" min="1" max="3" style="width: 60px; padding: 4px;">
  </p>
  <p>
    查询结果：
    <strong v-if="queriedUser" style="color: #42b983;">{{ queriedUser.name }}</strong>
    <span v-else style="color: #999;">未找到（试试 1、2、3）</span>
  </p>

  <p style="margin-top: 24px; color: #666; font-size: 14px;">
    切换组合式 / 选项式 toggle —— store 文件中三个 getter 的定义方式会同步切换。
  </p>
</div>
