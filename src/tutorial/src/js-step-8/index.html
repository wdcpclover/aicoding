<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数组与常用方法</title>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; padding: 20px; line-height: 1.8; }
        .output { background: #f5f5f5; padding: 15px; border-radius: 8px; margin: 10px 0; white-space: pre-line; }
    </style>
</head>
<body>
    <h1>数组与常用方法</h1>
    <div id="output" class="output"></div>

    <script>
        const r = []

        // ====== 数组基础 ======
        r.push('=== 数组基础 ===')
        const fruits = ['苹果', '香蕉', '橘子']
        r.push('fruits          = [' + fruits + ']')
        r.push('fruits[0]       = ' + fruits[0])
        r.push('fruits.length   = ' + fruits.length)

        fruits.push('葡萄')
        r.push('push 葡萄 后    = [' + fruits + ']')
        fruits.pop()
        r.push('pop 后          = [' + fruits + ']')
        r.push('includes 香蕉?  = ' + fruits.includes('香蕉'))

        // ====== 截取 / 拼接 / 反转 / 排序 ======
        r.push('\n=== 切片与排序 ===')
        const arr = [1, 2, 3, 4, 5]
        r.push('slice(1, 3)              = [' + arr.slice(1, 3) + ']')
        r.push("['小明','小红'].join('、') = " + ['小明','小红'].join('、'))
        r.push('[1,2,3].reverse()         = [' + [1,2,3].reverse() + ']')
        r.push('[10,2,30].sort() (按字符) = [' + [10,2,30].sort() + ']  ← 错！')
        r.push('sort((a,b)=>a-b) (按数字) = [' + [10,2,30].sort((a, b) => a - b) + ']')

        // ====== 链式调用 ======
        r.push('\n=== 链式: filter → map → join ===')
        const scores = [85, 92, 78, 96, 63, 88]
        const result = scores
            .filter(s => s >= 80)
            .map(s => `${s}分`)
            .join('、')
        r.push('80 分以上 → ' + result)

        // ====== reduce ======
        r.push('\n=== reduce 归纳 ===')
        r.push('总分 = ' + scores.reduce((sum, s) => sum + s, 0))
        r.push('平均 = ' + (scores.reduce((sum, s) => sum + s, 0) / scores.length).toFixed(2))
        r.push('最高 = ' + scores.reduce((m, s) => s > m ? s : m, 0))

        // ====== some / every ======
        r.push('\n=== some / every：表单验证 ===')
        const fields = ['小明', '', '计算机']
        r.push('fields = ' + JSON.stringify(fields))
        r.push('every 全部填写? = ' + fields.every(f => f !== ''))
        r.push('some 至少一个空? = ' + fields.some(f => f === ''))

        document.getElementById('output').textContent = r.join('\n')
    </script>
</body>
</html>
