<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CSS 入门</title>
    <style>
        /* 标签选择器：所有 p */
        p {
            color: #555;
            font-size: 16px;
        }
        /* 类选择器：class="highlight" */
        .highlight {
            color: #42b883;
            font-weight: bold;
        }
        /* id 选择器：id="title" */
        #title {
            color: #35495e;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 id="title">用 CSS 美化页面</h1>
    <p>这是一段普通文字（标签选择器命中）。</p>
    <p class="highlight">这一段被类选择器加了绿色加粗。</p>
    <p>试着把上面的颜色和字号改掉，看看效果。</p>
</body>
</html>
