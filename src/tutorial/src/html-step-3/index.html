<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录表单</title>
</head>
<body>
    <h1>用户登录</h1>

    <p>
        <label>用户名：<input type="text" placeholder="请输入用户名"></label>
    </p>

    <p>
        <label>密码：<input type="password" placeholder="请输入密码"></label>
    </p>

    <p>
        <label><input type="checkbox"> 记住我</label>
    </p>

    <p>
        城市：
        <select>
            <option>北京</option>
            <option>上海</option>
            <option>广州</option>
        </select>
    </p>

    <p>
        <label>留言：</label><br>
        <textarea placeholder="写点什么..."></textarea>
    </p>

    <p>
        <button>登录</button>
    </p>
</body>
</html>
