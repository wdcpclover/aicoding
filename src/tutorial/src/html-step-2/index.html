<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>常用标签</title>
</head>
<body>
    <h1>常用 HTML 标签</h1>
    <h2>这是二级标题</h2>

    <p>这是一个段落。段落用 &lt;p&gt; 标签包起来。</p>

    <h2>我的爱好（无序列表）</h2>
    <ul>
        <li>写代码</li>
        <li>打游戏</li>
        <li>看电影</li>
    </ul>

    <h2>学习步骤（有序列表）</h2>
    <ol>
        <li>先学 HTML</li>
        <li>再学 CSS</li>
        <li>最后学 JavaScript</li>
    </ol>

    <h2>链接和图片</h2>
    <p><a href="https://cn.vuejs.org">点我去 Vue 官网</a></p>
    <img src="https://cn.vuejs.org/logo.svg" alt="Vue Logo" width="120">
</body>
</html>
