<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>美化卡片</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f0f2f5;
            padding: 30px;
        }
        .card {
            background: #fff;
            width: 280px;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        }
        .card h2 {
            color: #35495e;
            margin: 0 0 8px;
        }
        .card p {
            color: #666;
            line-height: 1.7;
            margin: 0 0 16px;
        }
        .card button {
            background: #42b883;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>一张卡片</h2>
        <p>背景白 + 圆角 + 阴影 + 内边距，这就是最常见的卡片样式。</p>
        <button>了解更多</button>
    </div>
</body>
</html>
